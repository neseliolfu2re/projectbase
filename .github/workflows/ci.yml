name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, contracts, and Next build
        run: npm run check
        env:
          # Build succeeds without a real deployed address (UI shows connect/deploy hints).
          NEXT_PUBLIC_FORTUNE_COOKIE_ADDRESS: "0x0000000000000000000000000000000000000000"

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E smoke
        run: npm run test:e2e
        env:
          CI: true
          NEXT_PUBLIC_FORTUNE_COOKIE_ADDRESS: "0x0000000000000000000000000000000000000000"
